<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin The Wheel</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#1d2671,#c33764);
color:white;
margin:0;
}

h1{
margin-top:30px;
}

canvas{
margin-top:30px;
border-radius:50%;
box-shadow:0 0 30px rgba(255,255,255,0.6);
background:white;
}

button{
margin-top:25px;
padding:14px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

button:disabled{
background:gray;
cursor:not-allowed;
}

#result{
margin-top:25px;
font-size:26px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🎡 Spin The Wheel</h1>

<canvas id="wheel" width="400" height="400"></canvas>

<br>

<button id="spinBtn">SPIN</button>

<div id="result"></div>

<script>

const options=[
["5%","Discount"],
["Better Luck","Next Time"],
["₹5 Deduction","From Full Price"],
["10% Discount","On Next Order"],
["Free","Gift"]
];

const colors=[
"#3f8cff",
"#ff4d4d",
"#ffd93d",
"#2ecc71",
"#ff9ec4"
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const slices=options.length;
const sliceAngle=(2*Math.PI)/slices;

let startAngle=0;

function drawWheel(){

for(let i=0;i<slices;i++){

ctx.beginPath();
ctx.moveTo(200,200);

ctx.fillStyle=colors[i];

ctx.arc(
200,
200,
200,
startAngle+i*sliceAngle,
startAngle+(i+1)*sliceAngle
);

ctx.fill();

ctx.save();

ctx.translate(200,200);
ctx.rotate(startAngle+i*sliceAngle+sliceAngle/2);

ctx.textAlign="center";
ctx.fillStyle="black";
ctx.font="bold 16px Arial";

let text=options[i];

for(let j=0;j<text.length;j++){
ctx.fillText(text[j],110,j*20);
}

ctx.restore();

}

}

drawWheel();

const spinBtn=document.getElementById("spinBtn");
const resultText=document.getElementById("result");

if(localStorage.getItem("wheelSpun")){
spinBtn.disabled=true;
resultText.innerText="You have already used your spin!";
}

spinBtn.onclick=function(){

if(localStorage.getItem("wheelSpun")){
alert("You can only spin the wheel once!");
return;
}

let spinAngle=Math.random()*2000+2000;
let duration=2000;
let start=null;

function animate(timestamp){

if(!start) start=timestamp;

let progress=timestamp-start;

startAngle=(spinAngle*progress/duration)*Math.PI/180;

ctx.clearRect(0,0,400,400);
drawWheel();

if(progress<duration){

requestAnimationFrame(animate);

}else{

let degrees=(startAngle*180/Math.PI)%360;
let index=Math.floor((360-degrees)/(360/slices))%slices;

let result=options[index].join(" ");

resultText.innerText="Result: "+result;

localStorage.setItem("wheelSpun","true");

spinBtn.disabled=true;

}

}

requestAnimationFrame(animate);

};

</script>

</body>
</html>
